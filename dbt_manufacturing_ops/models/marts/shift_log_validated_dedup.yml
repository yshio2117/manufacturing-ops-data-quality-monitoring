version: 2

models:
  - name: shift_log_validated_dedup
    description: "Deduplicated view of shift_log_validated table."

    columns:
      - name: shift_log_id
        tests:
          - unique

      - name: date
        tests:
          - not_null

      - name: line
        tests:
          - not_null

      - name: shift
        tests:
          - not_null
          - accepted_values:
              values: ['A', 'B', 'C']