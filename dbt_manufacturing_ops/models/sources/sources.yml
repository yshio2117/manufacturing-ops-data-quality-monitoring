version: 2

sources:
  - name: shift_log
    database: "{{ env_var('PROJECT_ID') }}"
    schema: "{{ env_var('DATASET_ID') }}"
    tables:
      - name: raw
        identifier: "{{ env_var('TABLE_PREFIX', 'shift_log') ~ '_raw' }}"

      - name: validated
        identifier: "{{ env_var('TABLE_PREFIX', 'shift_log') ~ '_validated' }}"
        