version: 2

models:
  - name: shift_log_validated_dedup
    description: "Deduplicated view of shift_log_validated table."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - shift
            - line
          config:
            where: "shift_log_id IS NOT NULL"
            
    columns:
      - name: date
        tests:
          - not_null

      - name: line
        tests:
          - not_null

      - name: shift
        tests:
          - accepted_values:
              values: ['A', 'B', 'C']